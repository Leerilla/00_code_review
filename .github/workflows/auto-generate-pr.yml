name: Auto Generate Lab PR

on:
  issues:
    types: [opened]

jobs:
  create_lab_pr:
    if: startsWith(github.event.issue.title, '[실습신청]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Student Isolated Branches and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STUDENT: ${{ github.actor }}
        run: |
          set -ex

          # 1. 학생 전용 베이스(타겟) 브랜치 생성 (main 기준)
          BASE_BRANCH="base/step01-$STUDENT"
          git checkout -b $BASE_BRANCH origin/main
          git push -f origin $BASE_BRANCH

          # 2. 학생 전용 실습 브랜치 생성 (문제 코드 기준)
          LAB_BRANCH="lab/step01-$STUDENT"
          git checkout -b $LAB_BRANCH origin/feature/step01-discount-logic
          git push -f origin $LAB_BRANCH
          
          # 3. 마크다운 본문 파일 생성 (개행문자 깨짐 완벽 해결)
          cat << EOF > pr_body.md
          안녕하세요 @${STUDENT} 님!
          
          새로운 주문 할인율 계산 로직을 작성해 보았습니다. 바쁘시겠지만 코드 리뷰 부탁드립니다! 🙏
          
          ---
          **[🎯 리뷰어 미션]**
          1. 논리적 결함(경계값 등) 파악
          2. 성능 문제 확인
          3. '우리' 중심의 화법 적용
          4. 잘한 점 칭찬하기
          EOF
          
          # 4. 학생 전용 PR 생성 (lab -> base)
          PR_URL=$(gh pr create \
            --title "🚀 [실습] Chapter 1: $STUDENT 님, 리뷰를 부탁드립니다!" \
            --body-file pr_body.md \
            --base $BASE_BRANCH \
            --head $LAB_BRANCH \
            --reviewer $STUDENT)
            
          # 5. 이슈에 성공 코멘트 달고 닫기
          gh issue comment ${{ github.event.issue.number }} --body "🎉 전용 실습 환경이 준비되었습니다! \n\n👉 **[여기를 클릭하여 리뷰를 시작하세요]($PR_URL)**"
          gh issue close ${{ github.event.issue.number }}
