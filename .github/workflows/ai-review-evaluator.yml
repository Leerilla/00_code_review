name: AI Review Evaluator

on:
  pull_request_review:
    types: [submitted]

jobs:
  evaluate_review:
    # 봇이 남긴 리뷰에는 반응하지 않고, 실제 학생의 리뷰에만 반응합니다.
    if: github.event.review.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: AI 평가 코멘트 작성
        uses: actions/github-script@v7
        env:
          # Settings > Secrets and variables > Actions에 등록된 AI API KEY
          AI_API_KEY: ${{ secrets.AI_API_KEY }} 
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const reviewBody = context.payload.review.body;
            const reviewer = context.payload.review.user.login;
            
            // 1. 단순 승인(Approve)이나 너무 짧은 코멘트는 평가 생략
            if (!reviewBody || reviewBody.length < 10) {
              return;
            }

            console.log(`[${reviewer}님의 리뷰 분석 중...] \n${reviewBody}`);

            // 2. AI에게 전달할 강력한 평가 프롬프트
            const prompt = `
            당신은 시니어 자바 개발자이자 코드리뷰 강사입니다.
            학생이 작성한 다음 코드리뷰 코멘트를 4가지 기준에 따라 평가하고, 마크다운 형식으로 피드백을 작성해주세요.

            [평가 기준]
            1. 논리적 결함 파악: additionalDiscount 변수의 음수나 100% 초과 등 경계값 누락을 지적했는가?
            2. 성능 문제 확인: for문 내부에서 getBaseDiscountRate를 반복 호출하는 문제를 지적했는가?
            3. 부드러운 화법: '너'나 '나'가 아닌 '우리'라는 단어를 사용하거나 청유형(~하는 게 어떨까요?)을 사용했는가?
            4. 칭찬하기: Java 17 문법(record, switch) 등 잘한 점을 1개 이상 칭찬했는가?

            [학생의 리뷰 코멘트]
            "${reviewBody}"
            
            [출력 형식]
            - 각 기준별로 통과(✅) / 미흡(❌) 여부를 표시하고 짧은 피드백 제공
            - 종합적인 조언 1~2줄
            `;

            // -------------------------------------------------------------
            // 💡 이 부분에 AI API 호출 로직을 구현합니다. (아래는 Node.js fetch 예시)
            // const response = await fetch('https://api.openai.com/v1/chat/completions', { ... });
            // const data = await response.json();
            // const aiFeedbackText = data.choices[0].message.content;
            // -------------------------------------------------------------

            // (임시 테스트용 응답) API 연동 전까지 아래 텍스트가 출력됩니다.
            const aiFeedbackText = `🤖 **AI 리뷰 강사의 피드백 도착!**\n\n@${reviewer}님, 리뷰를 제출해 주셔서 감사합니다. 평가 기준에 따른 분석 결과입니다:\n\n` +
              `> 💡 (이곳에 AI가 분석한 평가 결과가 출력됩니다. API 연동을 완료해 주세요!)`;

            // 3. PR에 AI의 평가 결과를 코멘트로 등록
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: aiFeedbackText,
              event: 'COMMENT'
            });
