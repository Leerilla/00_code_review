name: AI Review Evaluator

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  evaluate_review:
    if: >
      (!github.event.issue || github.event.issue.pull_request) &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: AI 평가 코멘트 작성
        uses: actions/github-script@v7
        env:
          # GitHub Secrets에 등록한 API 키를 환경변수로 불러옵니다.
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const isReview = context.eventName === 'pull_request_review';
            const reviewBody = isReview ? context.payload.review.body : context.payload.comment.body;
            const reviewer = isReview ? context.payload.review.user.login : context.payload.comment.user.login;
            const prNumber = isReview ? context.payload.pull_request.number : context.payload.issue.number;

            if (!reviewBody || reviewBody.length < 5) {
              console.log("리뷰 내용이 너무 짧습니다.");
              return;
            }

            console.log(`[${reviewer}님의 리뷰 분석 시작...]`);

            // 1. AI에게 전달할 프롬프트
            const prompt = `
            당신은 시니어 자바 개발자이자 코드리뷰 강사입니다.
            학생이 작성한 다음 코드리뷰 코멘트를 4가지 기준에 따라 평가하고, 마크다운 형식으로 피드백을 작성해주세요.

            [평가 기준]
            1. 논리적 결함 파악: additionalDiscount 변수의 음수나 100% 초과 등 경계값 누락을 지적했는가?
            2. 성능 문제 확인: for문 내부에서 getBaseDiscountRate를 반복 호출하는 문제를 지적했는가?
            3. 부드러운 화법: '너'나 '나'가 아닌 '우리'라는 단어를 사용하거나 청유형(~하는 게 어떨까요?)을 사용했는가?
            4. 칭찬하기: Java 17 문법(record, switch) 등 잘한 점을 1개 이상 칭찬했는가?

            [학생의 리뷰 코멘트]
            "${reviewBody}"
            
            [출력 형식]
            - 각 기준별로 통과(✅) / 미흡(❌) 여부를 표시하고 짧은 피드백 제공
            - 종합적인 조언 1~2줄
            `;

            try {
              // 2. Gemini API 호출
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${process.env.AI_API_KEY}`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }]
                })
              });

              if (!response.ok) {
                const errorData = await response.text();
                throw new Error(`API 통신 실패: ${response.status} - ${errorData}`);
              }

              const data = await response.json();
              
              // 3. AI의 답변 추출
              const aiFeedback = data.candidates[0].content.parts[0].text;

              const aiFeedbackText = `🤖 **AI 리뷰 강사의 피드백 도착!**\n\n@${reviewer}님, 피드백을 남겨주셔서 감사합니다.\n\n**[작성하신 내용]**\n> ${reviewBody.split('\n').join('\n> ')}\n\n---\n\n**💡 AI 분석 결과:**\n\n${aiFeedback}`;

              // 4. PR에 봇이 코멘트 달기 (이 부분이 추가되었습니다!)
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: aiFeedbackText
              });
              
              console.log("AI 피드백 코멘트 작성 완료!");

            } catch (error) {
              console.error("AI API 호출 중 오류 발생:", error);
              
              // 에러 발생 시 예외 처리 코멘트
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `🤖 **AI 리뷰어 시스템 안내**\n\n@${reviewer}님, 코멘트를 잘 받았습니다!\n*(현재 AI 분석 서버와 통신하는 중 문제가 발생했습니다. API 키나 서버 상태를 확인해 주세요.)*`
              });
            }
