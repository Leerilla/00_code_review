name: AI Review Evaluator

on:
  # 1. 공식 리뷰(Submit review)를 제출했을 때
  pull_request_review:
    types: [submitted]
  # 2. PR 하단이나 코드 라인에 일반 코멘트를 달았을 때
  issue_comment:
    types: [created]

jobs:
  evaluate_review:
    # 봇이 작성한 코멘트는 무시하고, 이벤트가 PR에서 발생한 경우만 실행
    if: >
      (!github.event.issue || github.event.issue.pull_request) &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: AI 평가 코멘트 작성
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // 이벤트 종류에 따라 텍스트와 작성자 정보를 다르게 가져옵니다.
            const isReview = context.eventName === 'pull_request_review';
            const reviewBody = isReview ? context.payload.review.body : context.payload.comment.body;
            const reviewer = isReview ? context.payload.review.user.login : context.payload.comment.user.login;
            const prNumber = isReview ? context.payload.pull_request.number : context.payload.issue.number;

            // 코멘트가 너무 짧거나, 단순 시스템 메시지인 경우 무시
            if (!reviewBody || reviewBody.length < 5) {
              console.log("리뷰 내용이 너무 짧습니다.");
              return;
            }

            console.log(`[${reviewer}님의 리뷰 분석 중...] \n${reviewBody}`);

            // ------------------------------------------------------------------
            // ⚠️ [중요] 실제 AI API(OpenAI 등)를 호출하는 로직이 이곳에 들어가야 합니다!
            // 지금은 API가 연결되지 않았으므로 아래의 임시 텍스트가 출력됩니다.
            // ------------------------------------------------------------------
            
            const aiFeedbackText = `🤖 **AI 리뷰 강사의 피드백 도착!**\n\n@${reviewer}님, 피드백을 남겨주셔서 감사합니다.\n\n작성하신 내용: \n> ${reviewBody}\n\n**💡 AI 분석 결과:** (실제 AI API 연동 후 여기에 평가 결과가 출력됩니다.)`;

            // PR에 봇이 코멘트 달기
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: aiFeedbackText
            });
